local_backend: true

backend:
  name: git-gateway
  repo: Speedmarketing-dev/restaurant-starata-kashta
  branch: main
  identity_url: https://auth.decapbridge.com/sites/d41d582f-5fa1-457c-bbba-456046562b65
  gateway_url: https://gateway.decapbridge.com

# Decap + Bridge logo
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

publish_mode: simple

# Default upload locations
media_folder: "/public/images/uploads"
public_folder: "images/uploads"

locale: "bg"

collections:
  # --- 1. MENU COLLECTION ---
  - name: "menu"
    label: "Меню"
    label_singular: "Категория меню"
    folder: "src/content/menu"
    delete: true
    extension: "yaml"
    format: "yaml"
    slug: "{{slug}}"
    identifier_field: categoryTitle
    fields:
      - label: "Заглавие на категорията"
        name: "categoryTitle"
        widget: "string"
        hint: 'Показва се като заглавие на страницата, напр. "Предястия"'

      - label: "Дата"
        name: "categoryDate"
        widget: "string"
        required: false
        hint: 'За менюта, които се сменят редовно, напр. "17.07.2026". Оставете празно, ако не е нужно.'

      - label: "Артикули"
        name: "items"
        widget: "list"
        required: false
        summary: "{{fields.name}} — {{fields.priceEur}}€"
        fields:
          - label: "Име на артикула"
            name: "name"
            widget: "string"
            required: false

          - label: "Раздел"
            name: "subheading"
            widget: "string"
            required: false
            hint: 'Поставете тук заглавие напр. "Скара", "Риба" или "Нашето предложение".'

          - label: "Грамаж"
            name: "weight"
            widget: "string"
            required: false
            hint: 'напр. "200 гр."'

          - label: "Цена в евро"
            name: "priceEur"
            widget: "number"
            required: false
            value_type: "float"

          - label: "Цена в лева"
            name: "priceBgn"
            widget: "number"
            value_type: "float"
            required: false

          - label: "Бележка"
            name: "note"
            widget: "string"
            required: false
            hint: 'напр. "люто", "препоръчано" или списък със съставки'

  # --- 2. GALLERY COLLECTION ---
  - name: "gallery"
    label: "Галерия"
    label_singular: "Албум със снимки"
    folder: "src/content/gallery"
    create: true
    delete: true
    extension: "yaml"
    format: "yaml"
    slug: "{{slug}}"
    identifier_field: category
    media_folder: "/public/images/gallery"
    public_folder: "images/gallery"
    fields:
      - label: "Име на категорията"
        name: "category"
        widget: "string"
        hint: 'напр. "Екстериор", "Интериор", "Ястия"'

      - label: "Подредба (номер)"
        name: "order"
        widget: "number"
        required: false
        value_type: "int"
        default: 1
        hint: "По-малките числа показват албумите първи (напр. 1 за Екстериор, 2 за Интериор)"

      - label: "Снимки"
        name: "images"
        widget: "list"
        required: false
        summary: "{{fields.alt}}"
        fields:
          - label: "Файл със снимка"
            name: "src"
            widget: "image"
            hint: "Качете изображение"

          - label: "Описание на снимката"
            name: "alt"
            widget: "string"
            required: false
            hint: "Кратко описание на снимката"
